name: Auto Blog Post
# Generates 2 AI-written scam/cybersecurity blog posts daily using Gemini.
# Posts are committed directly to main — fully automatic, no PR review needed.
# Schedule: 6AM UTC and 6PM UTC (2 posts per day).

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        run: npx tsx scripts/generate-scam-post.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push
        run: |
          if git diff --quiet content/blog/; then
            echo "No new posts generated (possible duplicate topic). Skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          TITLE=$(git diff --cached --name-only | head -1 | xargs basename | sed 's/\.mdx//')
          git commit -m "blog: auto-publish ${TITLE}"
          git push origin main
