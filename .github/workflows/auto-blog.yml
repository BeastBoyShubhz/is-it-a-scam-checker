name: Auto Blog Post
# Generates 2 AI-written scam/cybersecurity blog posts daily using Gemini.
# Posts are committed directly to main — fully automatic, no PR review needed.
# Schedule: 6AM UTC and 6PM UTC (2 posts per day).

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        run: npx tsx scripts/generate-scam-post.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push
        run: |
          echo "=== Debug: generated files ==="
          ls -la content/blog/ || echo "content/blog/ does not exist"
          echo ""
          echo "=== Debug: current branch ==="
          git branch --show-current
          echo ""

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first — git diff doesn't see untracked (new) files
          git add content/blog/

          echo "=== Debug: git status after staging ==="
          git status --short
          echo ""

          if git diff --cached --quiet; then
            echo "No new posts generated (possible duplicate topic). Skipping."
            exit 0
          fi

          TITLE=$(git diff --cached --name-only | head -1 | xargs basename | sed 's/\.mdx//')
          echo "=== Debug: committing post: ${TITLE} ==="
          git commit -m "blog: auto-publish ${TITLE}"
          echo ""
          echo "=== Debug: pushing to origin main ==="
          git push origin main
          echo "=== Done: push successful ==="
